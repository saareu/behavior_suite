# Windows GUI runtime for behavior_suite.
#
# This Conda layer is intentionally minimal and reproducible. The installer
# recreates the dedicated environment from this file, then performs the
# editable local package install with S2 runtime dependencies separately:
#   python -m pip install -e ".[s2]"
name: behavior_suite_gui
channels:
  - conda-forge
dependencies:
  - python=3.12
  - ffmpeg=7.1.1
  - pyside6=6.11.1
  - pip
